name = "email-ingest-worker"
main = "src/index.ts"
compatibility_date = "2024-09-23"

# Email routing trigger — Cloudflare Email Routing sends emails here
[[email_routing.rules]]
enabled = true
name = "claims-inbox"
matchers = [{ type = "literal", field = "to", value = "claims@dumbroof.ai" }]
actions = [{ type = "worker", value = "email-ingest-worker" }]

# Secrets (set via `wrangler secret put WEBHOOK_URL` etc.)
# WEBHOOK_URL — Supabase Edge Function URL
# WEBHOOK_SECRET — Shared auth token
# FALLBACK_EMAIL — Tom's email for error forwarding

[vars]
ENVIRONMENT = "production"
