<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Template L — Left Column (Neutral)</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1080px; overflow: hidden; }
  .post {
    width: 1080px;
    height: 1080px;
    background: #F9F9F9;
    font-family: 'Space Grotesk', sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 120px;
    position: relative;
  }
  .label {
    position: absolute;
    top: 60px;
    left: 120px;
    font-size: 22px;
    font-weight: 500;
    color: #999;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .number {
    font-size: 160px;
    font-weight: 700;
    color: #085E55;
    line-height: 1;
    margin-bottom: 24px;
  }
  .headline {
    font-size: 52px;
    font-weight: 700;
    color: #0a0a0a;
    line-height: 1.25;
    margin-bottom: 40px;
  }
  .body-text {
    font-size: 30px;
    font-weight: 400;
    color: #555;
    line-height: 1.6;
  }
  .divider {
    width: 80px;
    height: 3px;
    background: #085E55;
    margin-bottom: 40px;
  }
  .footer {
    position: absolute;
    bottom: 60px;
    left: 120px;
    right: 120px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .footer-logo {
    font-size: 28px;
    font-weight: 700;
    color: #0a0a0a;
    letter-spacing: -1px;
  }
  .footer-tag {
    font-size: 20px;
    color: #999;
  }
</style>
</head>
<body>
<div class="post">
  <div class="label">How It Works</div>
  <div class="number">01</div>
  <div class="headline">Upload your photos.<br>That's literally it.</div>
  <div class="divider"></div>
  <div class="body-text">
    No measurements needed upfront.<br>
    No carrier scope required to start.<br>
    Just photos of the damage — Richard<br>
    handles the rest.
  </div>
  <div class="footer">
    <div class="footer-logo">dumbroof.ai</div>
    <div class="footer-tag">Claims made simple</div>
  </div>
</div>
</body>
</html>
