<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Silkscreen:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    background: #FFC0FF;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .richard-float {
    position: relative;
    width: 420px;
    height: 420px;
    /* Will be animated via JS */
  }

  /* The SVG clip + image fill */
  .richard-float svg {
    width: 420px;
    height: 420px;
    filter: drop-shadow(0px 30px 40px rgba(0,0,0,0.25));
  }

  .text-block {
    text-align: center;
    margin-top: 10px;
  }

  .headline {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 64px;
    color: #090909;
    letter-spacing: -2px;
    margin-bottom: 16px;
    opacity: 0;
  }

  .brand {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 96px;
    color: #090909;
    letter-spacing: -4px;
    opacity: 0;
  }

</style>
</head>
<body>

<div class="container">
  <div class="richard-float" id="richardFloat">
    <svg viewBox="0 0 1024 1024">
      <defs>
        <clipPath id="richard-clip">
          <path d="M 718.65 820.72 L 663.54 820.72 L 653.52 818.21 L 640.37 807.57 L 631.60 786.27 L 624.72 779.39 L 399.28 779.39 L 389.89 787.53 L 381.12 808.82 L 375.49 814.45 L 359.21 820.72 L 285.32 819.46 L 250.25 815.71 L 216.43 805.69 L 202.03 793.79 L 195.77 780.01 L 194.52 752.46 L 209.55 593.41 L 165.09 591.53 L 135.03 586.52 L 121.88 577.12 L 119.37 560.84 L 253.38 326.65 L 253.38 218.94 L 261.52 207.04 L 272.79 203.28 L 409.30 203.28 L 418.07 205.79 L 427.46 217.69 L 429.34 269.66 L 474.43 265.90 L 585.89 265.90 L 649.76 273.42 L 688.59 283.44 L 716.14 295.96 L 729.92 305.98 L 749.33 326.65 L 895.86 547.07 L 903.37 559.59 L 904.63 569.61 L 897.74 581.51 L 883.96 587.77 L 862.67 591.53 L 814.45 593.41 L 829.48 752.46 L 829.48 773.75 L 821.97 793.79 L 811.32 803.18 L 791.28 811.95 L 767.49 816.96 L 718.65 820.72 Z M 388.64 535.80 L 409.30 528.91 L 423.71 514.50 L 431.22 496.97 L 431.22 478.19 L 422.45 459.40 L 410.56 447.50 L 398.03 441.24 L 379.25 438.73 L 355.45 447.50 L 342.30 460.65 L 336.04 474.43 L 334.79 494.47 L 341.05 512.00 L 355.45 527.65 L 371.73 535.17 L 388.64 535.80 Z M 646.63 539.55 L 663.54 533.92 L 679.19 519.51 L 686.71 503.23 L 687.96 488.20 L 682.95 470.67 L 668.55 453.76 L 654.77 446.25 L 635.99 443.74 L 613.44 451.26 L 601.55 461.90 L 591.53 481.94 L 591.53 501.98 L 597.79 517.01 L 610.94 531.41 L 632.23 540.18 L 646.63 539.55 Z" fill-rule="evenodd"/>
        </clipPath>
        <!-- Metallic lighting effect -->
        <filter id="metal-light">
          <feSpecularLighting surfaceScale="8" specularConstant="1.2" specularExponent="25" result="spec">
            <fePointLight x="300" y="150" z="500"/>
          </feSpecularLighting>
          <feComposite in="spec" in2="SourceAlpha" operator="in" result="specOut"/>
          <feComposite in="SourceGraphic" in2="specOut" operator="arithmetic" k1="0" k2="0.7" k3="0.4" k4="0"/>
        </filter>
      </defs>

      <!-- Liquid metal texture clipped to Richard shape -->
      <g clip-path="url(#richard-clip)">
        <image id="metalTexture" href="liquid-metal-texture-1.png" x="50" y="100" width="924" height="750" preserveAspectRatio="xMidYMid slice"/>
      </g>

      <!-- Eye cutouts - filled with background color to "punch through" -->
      <ellipse cx="383" cy="490" rx="52" ry="52" fill="#FFC0FF"/>
      <ellipse cx="640" cy="490" rx="52" ry="52" fill="#FFC0FF"/>

      <!-- Specular highlight overlay on the shape -->
      <g clip-path="url(#richard-clip)" opacity="0.3">
        <ellipse cx="400" cy="350" rx="250" ry="180" fill="white" opacity="0.5"/>
      </g>
    </svg>
  </div>

  <div class="text-block">
    <div class="headline" id="headline">Richard never misses.</div>
    <div class="brand" id="brand">dumbroof.ai</div>
  </div>
</div>

<script>
const FPS = 30;
const VIDEO_END = 8; // 8 second loop

const richardFloat = document.getElementById('richardFloat');
const headline = document.getElementById('headline');
const brand = document.getElementById('brand');
const metalTexture = document.getElementById('metalTexture');

function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
function easeInOutSine(t) { return -(Math.cos(Math.PI * t) - 1) / 2; }

function renderFrame(t) {
  // Richard fades in and starts floating from 0-1.5s
  let richardOpacity = Math.min(t / 1.0, 1);
  let richardScale = 0.9 + 0.1 * easeOutCubic(Math.min(t / 1.2, 1));

  // Continuous gentle bobbing (sine wave)
  const bobAmount = 12; // pixels
  const bobSpeed = 0.8; // cycles per second
  const bobY = Math.sin(t * bobSpeed * Math.PI * 2) * bobAmount;

  // Slight rotation wobble
  const wobble = Math.sin(t * 0.6 * Math.PI * 2) * 1.5; // degrees

  // Subtle texture shift for liquid feel
  const texShiftX = Math.sin(t * 0.4 * Math.PI * 2) * 15 + 50;
  const texShiftY = Math.cos(t * 0.3 * Math.PI * 2) * 10 + 100;
  metalTexture.setAttribute('x', texShiftX);
  metalTexture.setAttribute('y', texShiftY);

  // Shadow grows/shrinks with bob
  const shadowBlur = 40 + Math.sin(t * bobSpeed * Math.PI * 2) * 10;
  const shadowY = 30 - Math.sin(t * bobSpeed * Math.PI * 2) * 8;
  const shadowOpacity = 0.25 - Math.sin(t * bobSpeed * Math.PI * 2) * 0.05;

  richardFloat.style.opacity = richardOpacity;
  richardFloat.style.transform = `translateY(${bobY}px) rotate(${wobble}deg) scale(${richardScale})`;
  richardFloat.querySelector('svg').style.filter = `drop-shadow(0px ${shadowY}px ${shadowBlur}px rgba(0,0,0,${shadowOpacity}))`;

  // Headline fades in at 1.5s
  if (t > 1.5) {
    const hp = easeOutCubic(Math.min((t - 1.5) / 0.8, 1));
    headline.style.opacity = hp;
    headline.style.transform = `translateY(${15 * (1 - hp)}px)`;
  }

  // Brand fades in at 2.3s
  if (t > 2.3) {
    const bp = easeOutCubic(Math.min((t - 2.3) / 0.8, 1));
    brand.style.opacity = bp;
    brand.style.transform = `translateY(${15 * (1 - bp)}px)`;
  }
}

// Expose for frame capture
window.renderFrame = renderFrame;
window.VIDEO_END = VIDEO_END;
window.FPS = FPS;

// Auto-play for preview
let startTime = null;
function animate(timestamp) {
  if (!startTime) startTime = timestamp;
  const t = (timestamp - startTime) / 1000;
  const loopT = t % VIDEO_END;
  renderFrame(loopT);
  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);
</script>

</body>
</html>
