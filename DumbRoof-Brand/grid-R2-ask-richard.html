<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1080px; overflow: hidden; }
  .post {
    width: 1080px; height: 1080px;
    background: #FFC0FF;
    font-family: 'Space Grotesk', sans-serif;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    text-align: center; padding: 100px;
    position: relative; overflow: hidden;
  }
  .bubble {
    background: #0a0a0a;
    border-radius: 32px 32px 8px 32px;
    padding: 44px 56px;
    margin-bottom: 28px;
    max-width: 700px;
  }
  .bubble-text {
    font-size: 34px; font-weight: 400; color: #fff; line-height: 1.5;
  }
  .bubble-reply {
    background: #FF6FFF;
    border-radius: 32px 32px 32px 8px;
    padding: 44px 56px;
    max-width: 700px;
    align-self: flex-start;
  }
  .reply-text {
    font-size: 42px; font-weight: 700; color: #0a0a0a; line-height: 1.3;
  }
  .timestamp {
    font-size: 22px; color: rgba(10,10,10,0.35);
    margin-top: 16px;
  }
  .footer {
    position: absolute; bottom: 60px;
    font-size: 28px; font-weight: 700; color: #0a0a0a;
    letter-spacing: -1px;
  }
</style>
</head>
<body>
<div class="post">
  <div class="bubble">
    <div class="bubble-text">The carrier only approved 4 line items on a 28-square roof...</div>
  </div>
  <div class="bubble-reply">
    <div class="reply-text">Did you ask Richard?</div>
  </div>
  <div class="timestamp">Every. Single. Time.</div>
  <div class="footer">dumbroof.ai</div>
</div>
</body>
</html>
