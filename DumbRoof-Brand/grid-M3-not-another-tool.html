<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1080px; overflow: hidden; }
  .post {
    width: 1080px; height: 1080px;
    background: #0a0a0a;
    font-family: 'Space Grotesk', sans-serif;
    display: flex; flex-direction: column;
    justify-content: center;
    padding: 120px;
    position: relative;
  }
  .strike {
    font-size: 52px; font-weight: 700; color: rgba(255,255,255,0.15);
    text-decoration: line-through;
    text-decoration-color: rgba(255,255,255,0.3);
    margin-bottom: 20px; line-height: 1.4;
  }
  .real {
    font-size: 62px; font-weight: 700; color: #fff;
    line-height: 1.25; margin-top: 40px; margin-bottom: 40px;
  }
  .highlight {
    color: #FF6FFF;
  }
  .body-text {
    font-size: 30px; font-weight: 400;
    color: rgba(255,255,255,0.45); line-height: 1.7;
  }
  .footer {
    position: absolute; bottom: 60px; left: 120px;
    font-size: 28px; font-weight: 700; color: #FF6FFF;
    letter-spacing: -1px;
  }
</style>
</head>
<body>
<div class="post">
  <div class="strike">Another estimating tool</div>
  <div class="strike">Another CRM add-on</div>
  <div class="strike">Another subscription</div>
  <div class="real">Not another <span class="highlight">anything.</span></div>
  <div class="body-text">
    Richard reads claims like a forensic analyst.<br>
    Finds what carriers miss.<br>
    Builds your package automatically.<br><br>
    This isn't a tool. It's a weapon.
  </div>
  <div class="footer">dumbroof.ai</div>
</div>
</body>
</html>
