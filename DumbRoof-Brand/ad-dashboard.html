<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Dumb Roof — Ad Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: #F9F9F9;
    color: #090909;
    padding: 40px;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .header h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 36px;
    font-weight: 700;
    letter-spacing: -1px;
  }

  .header h1 span { color: #FF6FFF; }

  .header .counts {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    color: #999;
  }

  .header .counts .approved { color: #085E55; font-weight: 600; }
  .header .counts .rejected { color: #FC032D; font-weight: 600; }

  .filters {
    display: flex;
    gap: 12px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }

  .filters button {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 8px 20px;
    border-radius: 20px;
    border: 2px solid #ddd;
    background: #fff;
    color: #666;
    cursor: pointer;
    transition: all 0.2s;
  }

  .filters button:hover { border-color: #999; color: #090909; }
  .filters button.active { background: #090909; color: #fff; border-color: #090909; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 28px;
  }

  .card {
    background: #fff;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    transition: all 0.3s;
    position: relative;
  }

  .card:hover { box-shadow: 0 8px 30px rgba(0,0,0,0.1); transform: translateY(-2px); }

  .card.rejected { opacity: 0.3; order: 999; }
  .card.rejected:hover { opacity: 0.6; }

  .card img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    display: block;
    cursor: pointer;
  }

  .card-info {
    padding: 18px 20px;
  }

  .card-info .name {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 18px;
    margin-bottom: 4px;
  }

  .card-info .concept {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    color: #999;
    margin-bottom: 12px;
    line-height: 1.4;
  }

  .card-info .tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }

  .card-info .tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 10px;
    background: #f0f0f0;
    color: #666;
  }

  .card-info .tag.platform { background: #E8F5E9; color: #085E55; }
  .card-info .tag.batch { background: #FFF0FF; color: #FF6FFF; }

  .card-actions {
    display: flex;
    gap: 8px;
  }

  .card-actions button {
    flex: 1;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 10px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-approve {
    background: #ABFF5A;
    color: #085E55;
  }
  .btn-approve:hover { background: #9CF04E; }
  .btn-approve.active { background: #085E55; color: #ABFF5A; }

  .btn-reject {
    background: #f5f5f5;
    color: #999;
  }
  .btn-reject:hover { background: #FC032D; color: #fff; }
  .btn-reject.active { background: #FC032D; color: #fff; }

  .status-badge {
    position: absolute;
    top: 14px;
    right: 14px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    z-index: 2;
  }

  .status-badge.approved { background: #ABFF5A; color: #085E55; }
  .status-badge.rejected { background: #FC032D; color: #fff; }
  .status-badge.pending { background: rgba(255,255,255,0.9); color: #999; }

  /* Lightbox */
  .lightbox {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.85);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-direction: column;
    gap: 16px;
  }
  .lightbox.active { display: flex; }
  .lightbox img {
    max-width: 90vw;
    max-height: 90vh;
    border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .lightbox iframe {
    border: none;
    border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    background: #000;
  }
  .lightbox .lb-label {
    font-family: monospace;
    font-size: 13px;
    color: #666;
  }
  .lightbox .lb-open-full {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    padding: 8px 20px;
    border-radius: 8px;
    border: 1px solid #555;
    background: #333;
    color: #fff;
    cursor: pointer;
    text-decoration: none;
  }
  .lightbox .lb-open-full:hover { background: #444; }

  .summary-bar {
    margin-top: 40px;
    padding: 24px 30px;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .summary-bar .summary-text {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 18px;
  }
  .summary-bar .summary-text span { color: #FF6FFF; }
</style>
</head>

// Load saved state
const STORAGE_KEY = 'dumbroof-ad-dashboard';
function loadState() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    ADS.forEach(ad => {
      if (saved[ad.id]) ad.status = saved[ad.id];
    });
  } catch(e) {}
}
function saveState() {
  const state = {};
  ADS.forEach(ad => state[ad.id] = ad.status);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function updateCounts() {
  document.getElementById('approved-count').textContent = ADS.filter(a => a.status === 'approved').length;
  document.getElementById('rejected-count').textContent = ADS.filter(a => a.status === 'rejected').length;
  document.getElementById('pending-count').textContent = ADS.filter(a => a.status === 'pending').length;
}

let currentFilter = 'all';

function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  const filtered = ADS.filter(ad => {
    if (currentFilter === 'all') return true;
    if (currentFilter === 'approved') return ad.status === 'approved';
    if (currentFilter === 'pending') return ad.status === 'pending';
    if (currentFilter === 'rejected') return ad.status === 'rejected';
    if (currentFilter === 'instagram') return ad.platform === 'instagram';
    if (currentFilter === 'facebook') return ad.platform === 'facebook';
    if (currentFilter === 'batch-1') return ad.batch === 'batch-1';
    if (currentFilter === 'batch-2') return ad.batch === 'batch-2';
    if (currentFilter === 'batch-3') return ad.batch === 'batch-3';
    if (currentFilter === 'batch-4') return ad.batch === 'batch-4';
    if (currentFilter === 'whoops') return ad.batch === 'whoops';
    if (currentFilter === 'nevermisses') return ad.batch === 'nevermisses';
    if (currentFilter === 'website') return ad.batch === 'website';
    if (currentFilter === 'canva') return ad.batch === 'canva';
    if (currentFilter === 'early-ads') return ad.batch === 'early-ads';
    if (currentFilter === 'chrome') return ad.batch === 'chrome';
    if (currentFilter === 'fb-banners') return ad.batch === 'fb-banners';
    if (currentFilter === 'posters') return ad.batch === 'posters';
    if (currentFilter === 'logos') return ad.batch === 'logos';
    if (currentFilter === 'metal-richard') return ad.batch === 'metal-richard';
    return true;
  });

  // Sort: approved first, pending, rejected last
  const order = { approved: 0, pending: 1, rejected: 2 };
  filtered.sort((a, b) => order[a.status] - order[b.status]);

  filtered.forEach(ad => {
    const card = document.createElement('div');
    card.className = `card ${ad.status === 'rejected' ? 'rejected' : ''}`;
    card.innerHTML = `
      <div class="status-badge ${ad.status}">${ad.status}</div>
      ${ad.fullHtml
        ? `<img src="${ad.file}" alt="${ad.name}" style="cursor:pointer;" onclick="openHtmlLightbox('${ad.fullHtml}','${ad.name}',true)">`
        : ad.file.endsWith('.html')
        ? `<div style="width:100%;aspect-ratio:1;background:#1a1a1a;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-direction:column;gap:10px;" onclick="openHtmlLightbox('${ad.file}','${ad.name}',false)">
            <div style="width:60px;height:60px;border-radius:50%;background:#FF6FFF;display:flex;align-items:center;justify-content:center;"><div style="width:0;height:0;border-top:15px solid transparent;border-bottom:15px solid transparent;border-left:25px solid #090909;margin-left:5px;"></div></div>
            <div style="font-family:monospace;color:#999;font-size:12px;">VIDEO — Click to Play</div>
          </div>`
        : `<img src="${ad.file}" alt="${ad.name}" onclick="openLightbox('${ad.file}')">`
      }
      <div class="card-info">
        <div class="name">${ad.name}</div>
        <div class="concept">${ad.concept}</div>
        <div class="tags">
          <span class="tag platform">${ad.platform}</span>
          <span class="tag batch">${ad.batch}</span>
        </div>
        <div class="card-actions">
          <button class="btn-approve ${ad.status === 'approved' ? 'active' : ''}" onclick="setStatus('${ad.id}', 'approved')">Approve</button>
          <button class="btn-reject ${ad.status === 'rejected' ? 'active' : ''}" onclick="setStatus('${ad.id}', 'rejected')">Reject</button>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });

  updateCounts();
}

function setStatus(id, status) {
  const ad = ADS.find(a => a.id === id);
  if (ad) {
    // Toggle off if clicking same status
    ad.status = ad.status === status ? 'pending' : status;
    saveState();
    renderGrid();
  }
}

function openLightbox(file) {
  const img = document.getElementById('lightbox-img');
  const iframe = document.getElementById('lightbox-iframe');
  const label = document.getElementById('lightbox-label');
  const fullbtn = document.getElementById('lightbox-fullbtn');
  img.style.display = 'block';
  iframe.style.display = 'none';
  fullbtn.style.display = 'none';
  img.src = file;
  label.textContent = file;
  document.getElementById('lightbox').classList.add('active');
}

function openHtmlLightbox(file, name, isWebsite) {
  const img = document.getElementById('lightbox-img');
  const iframe = document.getElementById('lightbox-iframe');
  const label = document.getElementById('lightbox-label');
  const fullbtn = document.getElementById('lightbox-fullbtn');
  img.style.display = 'none';
  iframe.style.display = 'block';
  fullbtn.style.display = 'inline-block';
  fullbtn.href = file;
  if (isWebsite) {
    // Website mockups: show at 70% viewport width, 16:9-ish
    iframe.style.width = '70vw';
    iframe.style.height = '70vh';
    iframe.style.transform = 'none';
  } else {
    // Video ads: scale down from 1080 to fit screen
    const scale = Math.min(0.55, (window.innerHeight * 0.75) / 1080);
    iframe.style.width = '1080px';
    iframe.style.height = '1080px';
    iframe.style.transform = `scale(${scale})`;
    iframe.style.transformOrigin = 'center center';
  }
  iframe.src = file;
  label.textContent = name;
  document.getElementById('lightbox').classList.add('active');
}

function closeLightbox(e) {
  if (e.target.tagName === 'IFRAME' || e.target.closest('.lb-open-full')) return;
  const iframe = document.getElementById('lightbox-iframe');
  iframe.src = 'about:blank';
  document.getElementById('lightbox').classList.remove('active');
}

// Filter buttons
document.querySelectorAll('.filters button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderGrid();
  });
});

// Init
loadState();
renderGrid();
</script>
