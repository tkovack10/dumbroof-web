<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1080px; overflow: hidden; }
  .post {
    width: 1080px; height: 1080px;
    background: #F9F9F9;
    font-family: 'Space Grotesk', sans-serif;
    display: flex; flex-direction: column;
    justify-content: center;
    padding: 120px;
    position: relative;
  }
  .label {
    position: absolute; top: 60px; left: 120px;
    font-size: 22px; font-weight: 500; color: #999;
    letter-spacing: 3px; text-transform: uppercase;
  }
  .step {
    display: flex; align-items: flex-start; gap: 28px;
    margin-bottom: 52px;
  }
  .step-num {
    font-size: 56px; font-weight: 700; color: #085E55;
    line-height: 1; min-width: 60px;
  }
  .step-text {
    font-size: 36px; font-weight: 500; color: #0a0a0a;
    line-height: 1.35;
  }
  .step-sub {
    font-size: 26px; font-weight: 400; color: #888;
    margin-top: 6px; line-height: 1.4;
  }
  .arrow {
    width: 2px; height: 36px; background: #ddd;
    margin-left: 28px; margin-bottom: 20px;
  }
  .footer {
    position: absolute; bottom: 60px; left: 120px; right: 120px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .footer-logo {
    font-size: 28px; font-weight: 700; color: #0a0a0a;
    letter-spacing: -1px;
  }
  .footer-tag { font-size: 20px; color: #999; }
</style>
</head>
<body>
<div class="post">
  <div class="label">Getting Started</div>
  <div class="step">
    <div class="step-num">1</div>
    <div>
      <div class="step-text">Upload your photos</div>
      <div class="step-sub">Damage shots from the roof. That's it.</div>
    </div>
  </div>
  <div class="arrow"></div>
  <div class="step">
    <div class="step-num">2</div>
    <div>
      <div class="step-text">Richard reviews everything</div>
      <div class="step-sub">Every line item. Every code. Every angle the carrier missed.</div>
    </div>
  </div>
  <div class="arrow"></div>
  <div class="step">
    <div class="step-num">3</div>
    <div>
      <div class="step-text">Get your claim package</div>
      <div class="step-sub">Complete, accurate, ready to send.</div>
    </div>
  </div>
  <div class="footer">
    <div class="footer-logo">dumbroof.ai</div>
    <div class="footer-tag">A few clicks. That's all.</div>
  </div>
</div>
</body>
</html>
