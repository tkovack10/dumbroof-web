<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=VT323&family=Pinyon+Script&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    background: #FFC0FF;
  }

  .scene {
    width: 1080px;
    height: 1080px;
    position: absolute;
    top: 0;
    left: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
  }

  .scene-1 {
    background: #FFC0FF;
    flex-direction: column;
    padding: 100px;
    align-items: flex-start;
    justify-content: center;
    opacity: 1;
  }

  .terminal-text {
    font-family: 'VT323', monospace;
    font-size: 96px;
    color: #090909;
    line-height: 1.2;
    text-transform: uppercase;
    letter-spacing: 2px;
    white-space: pre-wrap;
    min-height: 400px;
  }

  .cursor {
    display: inline-block;
    width: 50px;
    height: 90px;
    background: #090909;
    margin-left: 2px;
    vertical-align: middle;
  }

  .scene-2 {
    background: #FFC0FF;
  }

  .glitch-container {
    width: 1080px;
    height: 1080px;
    position: relative;
  }

  .glitch-slice {
    position: absolute;
    left: 0;
    width: 1080px;
    background: #FFC0FF;
    overflow: hidden;
  }

  .glitch-text {
    font-family: 'VT323', monospace;
    font-size: 96px;
    color: #090909;
    text-transform: uppercase;
    letter-spacing: 2px;
    position: absolute;
    padding: 100px;
    white-space: pre-wrap;
    width: 1080px;
  }

  .scene-3 {
    background: #090909;
    flex-direction: column;
    gap: 50px;
    padding-bottom: 120px;
  }

  .brand-reveal {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 108px;
    color: #FF6FFF;
    letter-spacing: -3px;
    opacity: 0;
  }

  .tagline-reveal {
    font-family: 'Pinyon Script', cursive;
    font-weight: 400;
    font-size: 52px;
    color: #FFC0FF;
    letter-spacing: 2px;
    opacity: 0;
  }

</style>
</head>
<body>

<div class="scene scene-1" id="scene1">
  <div class="terminal-text" id="typed"></div>
</div>

<div class="scene scene-2" id="scene2">
  <div class="glitch-container" id="glitchContainer"></div>
</div>

<div class="scene scene-3" id="scene3">
  <div class="brand-reveal" id="brandReveal">dumbroof.ai</div>
  <div class="tagline-reveal" id="taglineReveal">Sophisticated as f*ck.</div>
</div>

<script>
const PART1 = "Whoops...";
const PART2 = "\n\nWe're about\nto break the\nroofing\nindustry";
const FULL_TEXT = PART1 + PART2;
const FPS = 30;

function seededRandom(seed) {
  let x = Math.sin(seed * 9301 + 49297) * 49297;
  return x - Math.floor(x);
}

const BLINK_CYCLE = 0.55;
const TYPING_START = 0.5;
const TYPING_SPEED = 0.14;  // slower, deliberate — no machine gun
const PART1_END = TYPING_START + (PART1.length * TYPING_SPEED);
const BLINK1_START = PART1_END;
const BLINK1_END = BLINK1_START + (BLINK_CYCLE * 3);
const PART2_START = BLINK1_END;
const PART2_END = PART2_START + (PART2.length * TYPING_SPEED);
const BLINK2_START = PART2_END;
const BLINK2_END = BLINK2_START + (BLINK_CYCLE * 4);
const GLITCH_START = BLINK2_END;
const GLITCH_DURATION = 1.2;
const GLITCH_END = GLITCH_START + GLITCH_DURATION;
const BLACK_CUT = GLITCH_END;
const BRAND_APPEAR = BLACK_CUT;
const TAGLINE_START = BRAND_APPEAR + 1.4;
const TAGLINE_DURATION = 2.0;
const TAGLINE_END = TAGLINE_START + TAGLINE_DURATION;
const VIDEO_END = TAGLINE_END + 2.5;

const typed = document.getElementById('typed');
const scene1 = document.getElementById('scene1');
const scene2 = document.getElementById('scene2');
const scene3 = document.getElementById('scene3');
const brandReveal = document.getElementById('brandReveal');
const taglineReveal = document.getElementById('taglineReveal');
const glitchContainer = document.getElementById('glitchContainer');

function easeInOutQuart(t) {
  return t < 0.5 ? 8 * t * t * t * t : 1 - Math.pow(-2 * t + 2, 4) / 2;
}

function getCursorBlink(t, startTime) {
  const elapsed = t - startTime;
  const phase = (elapsed % BLINK_CYCLE) / BLINK_CYCLE;
  return phase < 0.5 ? 1 : 0;
}

// ─── AUDIO ENGINE ───
// Two separate AudioContexts: one for scenes 1+2, one for scene 3
// Closing a context kills ALL its sounds instantly — guaranteed silence

let sceneAudioCtx = null;
let lastTypedChar = -1;
let glitchSoundPlayed = false;
let soundKilled = false;

function initAudio() {
  if (sceneAudioCtx) return;
  sceneAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

// Pre-built keyboard click buffer — shaped to sound like a real laptop key
let clickBuffer = null;
function getClickBuffer() {
  if (clickBuffer) return clickBuffer;
  const sr = sceneAudioCtx.sampleRate;
  const len = Math.floor(sr * 0.025); // 25ms — very short
  clickBuffer = sceneAudioCtx.createBuffer(1, len, sr);
  const data = clickBuffer.getChannelData(0);
  for (let i = 0; i < len; i++) {
    const t = i / sr;
    const progress = i / len;
    // Sharp attack, quick exponential decay
    const env = Math.exp(-progress * 12);
    // Broadband noise shaped to sound like plastic key impact
    const noise = Math.random() * 2 - 1;
    // Add a tiny resonant "tick" at ~3kHz (the plastic click)
    const tick = Math.sin(t * 3200 * Math.PI * 2) * Math.exp(-progress * 20);
    data[i] = (noise * 0.6 + tick * 0.4) * env;
  }
  return clickBuffer;
}

function playTypeClick() {
  if (!sceneAudioCtx || sceneAudioCtx.state === 'closed') return;
  const now = sceneAudioCtx.currentTime;

  const src = sceneAudioCtx.createBufferSource();
  src.buffer = getClickBuffer();
  // Slight pitch variation per key — like different keys on a real keyboard
  src.playbackRate.value = 0.85 + Math.random() * 0.3;

  // Bandpass — keeps the natural mid-range of a keyboard, removes extremes
  const bp = sceneAudioCtx.createBiquadFilter();
  bp.type = 'bandpass';
  bp.frequency.value = 1800 + Math.random() * 600;
  bp.Q.value = 0.5;

  // Natural volume variation
  const vol = 0.18 + Math.random() * 0.06;
  const gain = sceneAudioCtx.createGain();
  gain.gain.value = vol;

  src.connect(bp);
  bp.connect(gain);
  gain.connect(sceneAudioCtx.destination);
  src.start(now);
}

function playGlitchSound() {
  if (!sceneAudioCtx || sceneAudioCtx.state === 'closed') return;
  const now = sceneAudioCtx.currentTime;
  const duration = GLITCH_DURATION;
  const dest = sceneAudioCtx.destination;

  // Layer 1: Noise + static that builds
  const bufSize = sceneAudioCtx.sampleRate * duration;
  const noiseBuf = sceneAudioCtx.createBuffer(2, bufSize, sceneAudioCtx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = noiseBuf.getChannelData(ch);
    for (let i = 0; i < bufSize; i++) {
      const progress = i / bufSize;
      const n = Math.random() * 2 - 1;
      const env = progress * progress * progress;
      const shaped = progress > 0.5 ? Math.round(n * 3) / 3 : n;
      d[i] = shaped * env * 0.5;
    }
  }
  const noiseSrc = sceneAudioCtx.createBufferSource();
  const noiseGain = sceneAudioCtx.createGain();
  noiseSrc.buffer = noiseBuf;
  noiseGain.gain.value = 0.5;
  noiseSrc.connect(noiseGain);
  noiseGain.connect(dest);
  noiseSrc.start(now);

  // Layer 2: Low rumble
  const rumble = sceneAudioCtx.createOscillator();
  const rumbleGain = sceneAudioCtx.createGain();
  rumble.type = 'sine';
  rumble.frequency.setValueAtTime(50, now);
  rumble.frequency.linearRampToValueAtTime(30, now + duration);
  rumbleGain.gain.setValueAtTime(0.1, now);
  rumbleGain.gain.linearRampToValueAtTime(0.4, now + duration);
  rumble.connect(rumbleGain);
  rumbleGain.connect(dest);
  rumble.start(now);

  // Layer 3: Electric buzz/hum
  const buzz = sceneAudioCtx.createOscillator();
  const buzzGain = sceneAudioCtx.createGain();
  buzz.type = 'sawtooth';
  buzz.frequency.setValueAtTime(60, now);
  buzz.frequency.exponentialRampToValueAtTime(200, now + duration);
  buzzGain.gain.setValueAtTime(0.02, now);
  buzzGain.gain.linearRampToValueAtTime(0.2, now + duration);
  buzz.connect(buzzGain);
  buzzGain.connect(dest);
  buzz.start(now);
}

function killAllAudio() {
  if (sceneAudioCtx && sceneAudioCtx.state !== 'closed') {
    sceneAudioCtx.close();
  }
  sceneAudioCtx = null;
  clickBuffer = null;
}

// ─── RENDER ───

function renderFrame(t) {
  if (t < GLITCH_START) {
    scene1.style.opacity = 1;
    scene2.style.opacity = 0;
    scene3.style.opacity = 0;

    let displayText = '';
    let cursorOpacity = 1;
    let currentCharCount = 0;

    if (t < TYPING_START) {
      displayText = '';
      cursorOpacity = getCursorBlink(t, 0);
    } else if (t < PART1_END) {
      const elapsed = t - TYPING_START;
      const chars = Math.min(Math.floor(elapsed / TYPING_SPEED), PART1.length);
      displayText = PART1.substring(0, chars);
      cursorOpacity = 1;
      currentCharCount = chars;
    } else if (t < BLINK1_END) {
      displayText = PART1;
      cursorOpacity = getCursorBlink(t, BLINK1_START);
      currentCharCount = PART1.length;
    } else if (t < PART2_END) {
      const elapsed = t - PART2_START;
      const chars = Math.min(Math.floor(elapsed / TYPING_SPEED), PART2.length);
      displayText = PART1 + PART2.substring(0, chars);
      cursorOpacity = 1;
      currentCharCount = PART1.length + chars;
    } else if (t < BLINK2_END) {
      displayText = FULL_TEXT;
      cursorOpacity = getCursorBlink(t, BLINK2_START);
      currentCharCount = FULL_TEXT.length;
    }

    // Play type sound for each new character
    if (sceneAudioCtx && currentCharCount > lastTypedChar && currentCharCount > 0) {
      const charAtPos = FULL_TEXT[currentCharCount - 1];
      if (charAtPos !== '\n') {
        playTypeClick();
      }
      lastTypedChar = currentCharCount;
    }

    typed.innerHTML = displayText + `<span class="cursor" style="opacity:${cursorOpacity}"></span>`;
  }

  // Glitch
  if (t >= GLITCH_START && t < BLACK_CUT) {
    scene1.style.opacity = 0;
    scene2.style.opacity = 1;
    scene3.style.opacity = 0;

    if (!glitchSoundPlayed && sceneAudioCtx) {
      playGlitchSound();
      glitchSoundPlayed = true;
    }

    const glitchProgress = (t - GLITCH_START) / GLITCH_DURATION;
    const frameIdx = Math.floor((t - GLITCH_START) * FPS);

    const numSlices = 18;
    const sliceHeight = 1080 / numSlices;
    let html = '';

    const shakeX = (seededRandom(frameIdx * 7) - 0.5) * 60 * glitchProgress;
    const shakeY = (seededRandom(frameIdx * 13) - 0.5) * 40 * glitchProgress;
    glitchContainer.style.transform = `translate(${shakeX}px, ${shakeY}px)`;

    for (let i = 0; i < numSlices; i++) {
      const yPos = i * sliceHeight;
      const seed = frameIdx * 100 + i;
      const shiftX = (seededRandom(seed) - 0.5) * 400 * glitchProgress;
      const shiftY = (seededRandom(seed + 50) - 0.5) * 80 * glitchProgress;
      const skew = (seededRandom(seed + 99) - 0.5) * 20 * glitchProgress;
      const scaleDistort = 1 + (seededRandom(seed + 77) - 0.5) * 0.3 * glitchProgress;
      const opacity = Math.max(0, 1 - (glitchProgress * 0.8));
      const colorFilter = glitchProgress > 0.2
        ? `hue-rotate(${seededRandom(seed + 200) * 360}deg) saturate(${1 + glitchProgress * 3})` : 'none';

      html += `<div class="glitch-slice" style="
        top: ${yPos}px;
        height: ${sliceHeight}px;
        transform: translateX(${shiftX}px) translateY(${shiftY}px) skewX(${skew}deg) scaleY(${scaleDistort});
        opacity: ${opacity};
        filter: ${colorFilter};
      "><div class="glitch-text" style="top: ${-yPos}px;">${FULL_TEXT.replace(/\n/g, '<br>')}</div></div>`;
    }

    if (glitchProgress > 0.15) {
      const ghostOffset = glitchProgress * 40;
      html += `<div style="position:absolute; top:0; left:${ghostOffset}px; width:1080px; height:1080px; mix-blend-mode:screen; opacity:${glitchProgress * 0.4};">
        <div class="glitch-text" style="color:#FF0040; top:0; filter:blur(2px);">${FULL_TEXT.replace(/\n/g, '<br>')}</div>
      </div>`;
      html += `<div style="position:absolute; top:0; left:${-ghostOffset}px; width:1080px; height:1080px; mix-blend-mode:screen; opacity:${glitchProgress * 0.4};">
        <div class="glitch-text" style="color:#00FF80; top:0; filter:blur(2px);">${FULL_TEXT.replace(/\n/g, '<br>')}</div>
      </div>`;
    }

    if (glitchProgress > 0.1) {
      const numBars = Math.floor(5 + glitchProgress * 20);
      for (let i = 0; i < numBars; i++) {
        const barY = seededRandom(frameIdx * 300 + i) * 1080;
        const barH = 1 + seededRandom(frameIdx * 300 + i + 50) * 12;
        const barColor = seededRandom(frameIdx * 300 + i + 99) > 0.5 ? '#FF6FFF' : '#ABFF5A';
        html += `<div style="position:absolute; top:${barY}px; left:0; width:1080px; height:${barH}px; background:${barColor}; opacity:${glitchProgress * 0.8};"></div>`;
      }
    }

    if (glitchProgress > 0.4 && seededRandom(frameIdx * 500) > 0.5) {
      const flashColor = seededRandom(frameIdx * 501) > 0.5 ? '#FF6FFF' : '#ABFF5A';
      html += `<div style="position:absolute; top:0; left:0; width:1080px; height:1080px; background:${flashColor}; opacity:${0.15 + seededRandom(frameIdx * 502) * 0.2};"></div>`;
    }

    if (glitchProgress > 0.85) {
      const flashOpacity = ((glitchProgress - 0.85) / 0.15);
      html += `<div style="position:absolute; top:0; left:0; width:1080px; height:1080px; background:#fff; opacity:${flashOpacity};"></div>`;
    }

    glitchContainer.innerHTML = html;
  }

  // Scene 3: Hard cut + music
  if (t >= BLACK_CUT) {
    scene1.style.opacity = 0;
    scene2.style.opacity = 0;
    scene3.style.opacity = 1;
    glitchContainer.style.transform = 'none';

    // KILL all audio — close entire context = instant dead silence
    if (!soundKilled) {
      killAllAudio();
      soundKilled = true;
    }

    brandReveal.style.opacity = 1;
    brandReveal.style.transform = 'translateY(0)';

    if (t >= TAGLINE_START && t <= TAGLINE_END) {
      const p = easeInOutQuart((t - TAGLINE_START) / TAGLINE_DURATION);
      taglineReveal.style.opacity = p;
    } else if (t > TAGLINE_END) {
      taglineReveal.style.opacity = 1;
    }
  }
}

// ─── PLAY OVERLAY ───
// Show a "click to play" overlay so audio works (browser requirement)
const overlay = document.createElement('div');
overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;z-index:9999;cursor:pointer;flex-direction:column;gap:20px;';
overlay.innerHTML = '<div style="font-family:Space Grotesk,sans-serif;color:#FF6FFF;font-size:48px;font-weight:700;">Click to Play</div><div style="font-family:monospace;color:#999;font-size:16px;">with sound</div>';
document.body.appendChild(overlay);

overlay.addEventListener('click', () => {
  overlay.remove();
  initAudio();
  lastTypedChar = -1;
  glitchSoundPlayed = false;
  soundKilled = false;
  startTime = null;
  requestAnimationFrame(animate);
});

let startTime = null;
function animate(timestamp) {
  if (!startTime) startTime = timestamp;
  const t = (timestamp - startTime) / 1000;
  if (t <= VIDEO_END) {
    renderFrame(t);
    requestAnimationFrame(animate);
  }
}

window.renderFrame = renderFrame;
window.VIDEO_END = VIDEO_END;
window.FPS = FPS;
</script>

</body>
</html>
