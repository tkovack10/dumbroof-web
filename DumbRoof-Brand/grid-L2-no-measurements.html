<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1080px; overflow: hidden; }
  .post {
    width: 1080px; height: 1080px;
    background: #F9F9F9;
    font-family: 'Space Grotesk', sans-serif;
    display: flex; flex-direction: column;
    justify-content: center;
    padding: 120px;
    position: relative;
  }
  .label {
    position: absolute; top: 60px; left: 120px;
    font-size: 22px; font-weight: 500; color: #999;
    letter-spacing: 3px; text-transform: uppercase;
  }
  .myth {
    display: flex; align-items: flex-start; gap: 20px;
    margin-bottom: 56px;
  }
  .x-mark {
    font-size: 48px; font-weight: 700; color: #cc3333;
    line-height: 1; min-width: 50px;
  }
  .check-mark {
    font-size: 48px; font-weight: 700; color: #085E55;
    line-height: 1; min-width: 50px;
  }
  .myth-text {
    font-size: 36px; font-weight: 500; color: #bbb;
    line-height: 1.35; text-decoration: line-through;
    text-decoration-color: #ccc;
  }
  .truth-text {
    font-size: 36px; font-weight: 500; color: #0a0a0a;
    line-height: 1.35;
  }
  .truth-sub {
    font-size: 26px; font-weight: 400; color: #888;
    margin-top: 6px; line-height: 1.4;
  }
  .footer {
    position: absolute; bottom: 60px; left: 120px; right: 120px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .footer-logo {
    font-size: 28px; font-weight: 700; color: #0a0a0a;
    letter-spacing: -1px;
  }
  .footer-tag { font-size: 20px; color: #999; }
</style>
</head>
<body>
<div class="post">
  <div class="label">Myth vs. Reality</div>
  <div class="myth">
    <div class="x-mark">X</div>
    <div>
      <div class="myth-text">"I need measurements before I can start a claim"</div>
    </div>
  </div>
  <div class="myth">
    <div class="check-mark">+</div>
    <div>
      <div class="truth-text">Photos first. Measurements when you have them.</div>
      <div class="truth-sub">Richard works with what you've got. Add details later — your claim package builds as you go.</div>
    </div>
  </div>
  <div class="footer">
    <div class="footer-logo">dumbroof.ai</div>
    <div class="footer-tag">Start with what you have</div>
  </div>
</div>
</body>
</html>
