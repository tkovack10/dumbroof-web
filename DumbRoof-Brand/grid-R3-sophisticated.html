<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1080px; overflow: hidden; }
  .post {
    width: 1080px; height: 1080px;
    background: #FF6FFF;
    font-family: 'Space Grotesk', sans-serif;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    text-align: center; padding: 100px;
    position: relative; overflow: hidden;
  }
  .logo {
    font-size: 108px; font-weight: 700; color: #0a0a0a;
    letter-spacing: -4px; line-height: 1;
    margin-bottom: 32px;
  }
  .divider {
    width: 120px; height: 2px; background: rgba(10,10,10,0.2);
    margin-bottom: 36px;
  }
  .tagline {
    font-family: 'Pinyon Script', cursive;
    font-size: 72px; color: #FFC0FF;
    line-height: 1.2;
  }
  .bottom-text {
    position: absolute; bottom: 100px;
    font-size: 26px; font-weight: 500;
    color: rgba(10,10,10,0.35);
    letter-spacing: 4px; text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="post">
  <div class="logo">dumbroof.ai</div>
  <div class="divider"></div>
  <div class="tagline">Sophisticated as f*ck.</div>
  <div class="bottom-text">Claims Intelligence</div>
</div>
</body>
</html>
