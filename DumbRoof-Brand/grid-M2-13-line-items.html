<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1080px; overflow: hidden; }
  .post {
    width: 1080px; height: 1080px;
    background: #0a0a0a;
    font-family: 'Space Grotesk', sans-serif;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    text-align: center; padding: 100px;
    position: relative;
  }
  .vs {
    display: flex; align-items: center; gap: 48px;
    margin-bottom: 56px;
  }
  .side {
    display: flex; flex-direction: column; align-items: center;
  }
  .side-label {
    font-size: 22px; font-weight: 500;
    letter-spacing: 2px; text-transform: uppercase;
    margin-bottom: 16px;
  }
  .carrier-label { color: rgba(255,255,255,0.35); }
  .richard-label { color: #ABFF5A; }
  .big {
    font-size: 160px; font-weight: 700; line-height: 1;
    letter-spacing: -4px;
  }
  .carrier-num { color: rgba(255,255,255,0.25); }
  .richard-num { color: #FF6FFF; }
  .unit {
    font-size: 28px; font-weight: 400; margin-top: 8px;
  }
  .carrier-unit { color: rgba(255,255,255,0.2); }
  .richard-unit { color: rgba(255,111,255,0.6); }
  .vs-text {
    font-size: 36px; font-weight: 700; color: rgba(255,255,255,0.15);
  }
  .punchline {
    font-size: 40px; font-weight: 700; color: #fff; line-height: 1.3;
  }
  .sub {
    font-size: 26px; color: rgba(255,255,255,0.4); margin-top: 16px;
  }
  .footer {
    position: absolute; bottom: 60px;
    font-size: 28px; font-weight: 700; color: #FF6FFF;
    letter-spacing: -1px;
  }
</style>
</head>
<body>
<div class="post">
  <div class="vs">
    <div class="side">
      <div class="side-label carrier-label">Carrier</div>
      <div class="big carrier-num">4</div>
      <div class="unit carrier-unit">line items</div>
    </div>
    <div class="vs-text">vs</div>
    <div class="side">
      <div class="side-label richard-label">Richard</div>
      <div class="big richard-num">13</div>
      <div class="unit richard-unit">line items</div>
    </div>
  </div>
  <div class="punchline">Same roof. Same storm.<br>Different outcome.</div>
  <div class="sub">Richard found $9,027 the carrier "missed."</div>
  <div class="footer">dumbroof.ai</div>
</div>
</body>
</html>
