<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Template M — Middle Column (Impact)</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1080px; overflow: hidden; }
  .post {
    width: 1080px;
    height: 1080px;
    background: #085E55;
    font-family: 'Space Grotesk', sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 120px;
    position: relative;
  }
  .top-label {
    position: absolute;
    top: 60px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 22px;
    font-weight: 500;
    color: rgba(255,255,255,0.4);
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .big-number {
    font-size: 200px;
    font-weight: 700;
    color: #ABFF5A;
    line-height: 1;
    letter-spacing: -8px;
  }
  .unit {
    font-size: 48px;
    font-weight: 700;
    color: #ABFF5A;
    margin-bottom: 40px;
  }
  .statement {
    font-size: 44px;
    font-weight: 700;
    color: #ffffff;
    line-height: 1.3;
    max-width: 700px;
  }
  .sub {
    font-size: 26px;
    font-weight: 400;
    color: rgba(255,255,255,0.6);
    margin-top: 24px;
  }
  .footer {
    position: absolute;
    bottom: 60px;
    left: 0;
    right: 0;
    text-align: center;
  }
  .footer-logo {
    font-size: 28px;
    font-weight: 700;
    color: #ABFF5A;
    letter-spacing: -1px;
  }
</style>
</head>
<body>
<div class="post">
  <div class="top-label">By The Numbers</div>
  <div class="big-number">$9,027</div>
  <div class="unit">found in one claim</div>
  <div class="statement">The carrier missed 9 line items.<br>Richard didn't.</div>
  <div class="sub">Real claim. Real money. Real difference.</div>
  <div class="footer">
    <div class="footer-logo">dumbroof.ai</div>
  </div>
</div>
</body>
</html>
