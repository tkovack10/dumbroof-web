<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1080px; overflow: hidden; }
  .post {
    width: 1080px; height: 1080px;
    background: #085E55;
    font-family: 'Space Grotesk', sans-serif;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    text-align: center; padding: 100px;
    position: relative;
  }
  .top-label {
    position: absolute; top: 60px;
    font-size: 22px; font-weight: 500;
    color: rgba(255,255,255,0.35); letter-spacing: 3px;
    text-transform: uppercase;
  }
  .dollar {
    font-size: 68px; font-weight: 700; color: rgba(171,255,90,0.5);
    line-height: 1; margin-bottom: -20px;
  }
  .number {
    font-size: 220px; font-weight: 700; color: #ABFF5A;
    line-height: 1; letter-spacing: -10px;
  }
  .label {
    font-size: 42px; font-weight: 500; color: #ffffff;
    margin-top: 12px; margin-bottom: 48px;
  }
  .detail {
    font-size: 30px; font-weight: 400;
    color: rgba(255,255,255,0.5); line-height: 1.6;
  }
  .footer {
    position: absolute; bottom: 60px;
    font-size: 28px; font-weight: 700; color: #ABFF5A;
    letter-spacing: -1px;
  }
</style>
</head>
<body>
<div class="post">
  <div class="top-label">What Richard Found</div>
  <div class="dollar">$</div>
  <div class="number">943,233</div>
  <div class="label">in missed claim revenue</div>
  <div class="detail">Across 127 claims reviewed.<br>Money the carriers hoped you'd never find.</div>
  <div class="footer">dumbroof.ai</div>
</div>
</body>
</html>
