<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;800&family=Cormorant+Garamond:ital,wght@1,300&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 820px; height: 312px; overflow: hidden; }
  .cover {
    width: 820px; height: 312px;
    background: #FFC0FF;
    font-family: 'Space Grotesk', sans-serif;
    display: flex;
    align-items: center;
    padding: 0 56px;
    position: relative;
    overflow: hidden;
  }
  .left { z-index: 2; flex: 1; }
  .headline {
    font-size: 36px; font-weight: 800;
    color: #090909; letter-spacing: -1.5px;
    line-height: 1.08; margin-bottom: 12px;
  }
  .body {
    font-size: 14px; color: #085E55;
    line-height: 1.7; max-width: 380px;
    margin-bottom: 20px;
  }
  .body strong { font-weight: 700; color: #090909; }
  .cta-row { display: flex; gap: 12px; align-items: center; }
  .cta {
    background: #FF6FFF; color: #090909;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px; font-weight: 700;
    padding: 12px 28px; border-radius: 100px;
  }
  .cta-sec {
    font-size: 13px; color: #085E55;
    font-weight: 600;
  }
  .right {
    z-index: 2; width: 280px;
    display: flex; flex-direction: column;
    align-items: center; gap: 4px;
  }
  .before-after {
    background: #fff;
    border-radius: 14px;
    padding: 24px 28px;
    width: 240px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.06);
    text-align: center;
  }
  .ba-label {
    font-size: 9px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: #bbb; margin-bottom: 12px;
  }
  .ba-before {
    font-size: 20px; font-weight: 700;
    color: #ccc; text-decoration: line-through;
    margin-bottom: 4px;
  }
  .ba-after {
    font-size: 40px; font-weight: 800;
    color: #090909; letter-spacing: -2px;
    line-height: 1; margin-bottom: 8px;
  }
  .ba-foot {
    font-size: 11px; color: #085E55;
    font-weight: 600;
  }
  .tagline {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic; font-size: 16px;
    color: #085E55; margin-top: 8px;
  }
  .accent {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 4px; background: #FF6FFF;
  }
</style>
</head>
<body>
<div class="cover">
  <div class="left">
    <div class="headline">Don't tell them they<br>have damage. Show them.</div>
    <div class="body">Richard turns your photos into <strong>forensic-grade, code-cited documentation</strong> that carriers can't dismiss — sent from your own inbox.</div>
    <div class="cta-row">
      <div class="cta">Ask Richard</div>
      <div class="cta-sec">dumbroof.ai</div>
    </div>
  </div>
  <div class="right">
    <div class="before-after">
      <div class="ba-label">Before vs After Richard</div>
      <div class="ba-before">$20,408</div>
      <div class="ba-after">$943,233</div>
      <div class="ba-foot">Same claim. Same house.</div>
    </div>
    <div class="tagline">Sophisticated as f*ck.</div>
  </div>
  <div class="accent"></div>
</div>
</body>
</html>
