<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1080px; overflow: hidden; }
  .post {
    width: 1080px; height: 1080px;
    background: #F9F9F9;
    font-family: 'Space Grotesk', sans-serif;
    display: flex; flex-direction: column;
    justify-content: center;
    padding: 100px 120px;
    position: relative;
  }
  .label {
    position: absolute; top: 60px; left: 120px;
    font-size: 22px; font-weight: 500; color: #999;
    letter-spacing: 3px; text-transform: uppercase;
  }
  .headline {
    font-size: 44px; font-weight: 700; color: #0a0a0a;
    margin-bottom: 48px; line-height: 1.2;
  }
  .list { list-style: none; }
  .list li {
    font-size: 30px; font-weight: 400; color: #444;
    padding: 18px 0;
    border-bottom: 1px solid #eee;
    display: flex; align-items: center; gap: 20px;
  }
  .list li:last-child { border-bottom: none; }
  .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #085E55; flex-shrink: 0;
  }
  .footer {
    position: absolute; bottom: 60px; left: 120px; right: 120px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .footer-logo {
    font-size: 28px; font-weight: 700; color: #0a0a0a;
    letter-spacing: -1px;
  }
  .footer-tag { font-size: 20px; color: #999; }
</style>
</head>
<body>
<div class="post">
  <div class="label">Behind The Scenes</div>
  <div class="headline">What Richard checks<br>on every claim</div>
  <ul class="list">
    <li><span class="dot"></span>Roof dimensions & pitch</li>
    <li><span class="dot"></span>Missing line items</li>
    <li><span class="dot"></span>Code compliance gaps</li>
    <li><span class="dot"></span>Material & labor pricing</li>
    <li><span class="dot"></span>Carrier scope accuracy</li>
    <li><span class="dot"></span>Supplement opportunities</li>
    <li><span class="dot"></span>Documentation completeness</li>
  </ul>
  <div class="footer">
    <div class="footer-logo">dumbroof.ai</div>
    <div class="footer-tag">Nothing gets past Richard</div>
  </div>
</div>
</body>
</html>
