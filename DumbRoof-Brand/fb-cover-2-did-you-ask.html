<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 820px; height: 312px; overflow: hidden; }
  .cover {
    width: 820px; height: 312px;

    align-items: center;
    justify-content: space-between;

  .cta {
    display: inline-flex;
    background: #FF6FFF; color: #090909;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px; font-weight: 700;
    padding: 12px 28px; border-radius: 100px;
  }
  .right {
    z-index: 2;
    display: flex; flex-direction: column;
    align-items: center; gap: 8px;
  }
  .richard-circle {
    width: 140px; height: 140px;
    border-radius: 50%;
    background: #ABFF5A;
    display: flex; align-items: center; justify-content: center;
  }
  .richard-circle svg { width: 90px; height: 90px; }
  .richard-label {
    font-size: 13px; font-weight: 700;
    color: #ABFF5A; letter-spacing: -0.3px;
  }
  .accent {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 4px; background: #FF6FFF;
  }
</style>
