<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 820px; height: 312px; overflow: hidden; }
  .cover {
    width: 820px; height: 312px;
    background: #ABFF5A;
    font-family: 'Space Grotesk', sans-serif;
    display: flex;
    align-items: center;
    padding: 0 56px;
    position: relative;
    overflow: hidden;
  }
  .content { z-index: 2; flex: 1; }
  .eyebrow {
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: #085E55; margin-bottom: 16px; opacity: 0.7;
  }
  .headline {

    color: #085E55; letter-spacing: -1.5px;
    line-height: 1.08; margin-bottom: 16px;
  }
  .sub {
    font-size: 14px; color: #085E55;
    line-height: 1.6; max-width: 400px;
    margin-bottom: 20px; opacity: 0.7;
  }
  .stats {
    display: flex; gap: 32px;
  }
  .stat-num {
    font-size: 28px; font-weight: 800;
    color: #085E55; letter-spacing: -1px; line-height: 1;
  }
  .stat-label {
    font-size: 10px; color: #085E55;
    opacity: 0.6; margin-top: 2px;
  }
  .richard-bg {
    position: absolute; right: 30px; top: 50%;
    transform: translateY(-50%);
    width: 260px; height: 260px;
    opacity: 0.12; z-index: 1;
  }
  .logo {
    position: absolute; bottom: 20px; right: 56px;
    font-size: 16px; font-weight: 700;
    color: #085E55; letter-spacing: -0.5px;
    z-index: 2;
  }
